<!-- 
what is css-selector ? 

  1. css selector is used to access html elements for stylesheet
  2. css selector is used to provides different-2 style on your webpage 
  3. types of css selector 

     1. universal selector (*)
     2. element selector (tag)
     3. id selector 
     4. class selector 
     5. grouping selector 
     6. pseudo element selector 
     7. pseudo class selector 
     8. combinator selector 
        a) descendant combinator selector (space)
        b) child combinator selector (>)
        c) next sibling combinator (+)
        d) subsequent-sibling combinator selector(~) 


-->
